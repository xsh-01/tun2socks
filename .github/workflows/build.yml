name: Build Go Releases

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test tags'
        required: true
        type: string

jobs:
  build:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          check-latest: true
          go-version-file: 'go.mod'

      - name: Build
        run: make -j releases

      - name: Upload Releases
        uses: actions/upload-artifact@v4
        with:
          files: build/*
